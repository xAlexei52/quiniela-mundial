name: Deploy a Hostinger (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, pdo, pdo_mysql, intl, zip
          coverage: none

      - name: Instalar dependencias de PHP (producción)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Compilar assets (Tailwind/Vite)
        run: |
          npm ci
          npm run build

      - name: Subir por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Hostinger: FTP simple en el puerto 21 es lo más estable con este action.
          # (Con "ftps" suele dar "Timeout (control socket)" por el handshake TLS.)
          protocol: ftp
          port: 21
          # Más margen: Hostinger a veces tarda en responder el socket de control.
          timeout: 120000
          # Cuenta MAIN u661117467 (cae en su home /home/u661117467, que es la raíz FTP "/").
          # Ruta completa hasta la carpeta del proyecto dentro del dominio:
          server-dir: /domains/alexeipalacios.cloud/public_html/quiniela/
          # No subimos esto: el servidor tiene su propio .env, y vendor/build ya van compilados.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            tests/**
            .github/**
            phpunit.xml
            README.md
            database/*.sqlite
            storage/framework/views/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/logs/**
